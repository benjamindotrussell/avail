name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false  # never cancel a deploy mid-flight

env:
  AWS_REGION: eu-west-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-west-1.amazonaws.com
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ─── Build and push all service images ─────────────────────────────────────
  build-and-push:
    name: Build and push (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - auth-service
          - groups-service
          - status-service
          - notification-service
          - websocket-service
    outputs:
      image-tag: ${{ env.IMAGE_TAG }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile.service
          build-args: SERVICE_NAME=${{ matrix.service }}
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/avail-${{ matrix.service }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/avail-${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ─── Deploy to staging ──────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig for staging
        run: aws eks update-kubeconfig --name avail-staging --region ${{ env.AWS_REGION }}

      - name: Run DB migrations (staging)
        run: |
          kubectl run prisma-migrate-${{ env.IMAGE_TAG }} \
            --image=${{ env.ECR_REGISTRY }}/avail-auth-service:${{ env.IMAGE_TAG }} \
            --restart=Never \
            --namespace=avail-staging \
            --env="DATABASE_URL=${{ secrets.STAGING_DATABASE_URL }}" \
            --command -- npx prisma migrate deploy --schema packages/shared/prisma/schema.prisma
          kubectl wait --for=condition=complete \
            job/prisma-migrate-${{ env.IMAGE_TAG }} \
            --timeout=120s \
            --namespace=avail-staging || true

      - name: Deploy to staging
        run: |
          # Update image tags in K8s manifests
          for SERVICE in auth-service groups-service status-service notification-service websocket-service; do
            kubectl set image deployment/avail-${SERVICE} \
              ${SERVICE}=${{ env.ECR_REGISTRY }}/avail-${SERVICE}:${{ env.IMAGE_TAG }} \
              --namespace=avail-staging
          done

      - name: Wait for rollout
        run: |
          for SERVICE in auth-service groups-service status-service notification-service websocket-service; do
            kubectl rollout status deployment/avail-${SERVICE} \
              --namespace=avail-staging \
              --timeout=300s
          done

      - name: Run smoke tests against staging
        run: |
          STAGING_URL=${{ secrets.STAGING_API_URL }}
          # Health checks
          curl -f ${STAGING_URL}/health || exit 1
          echo "Staging smoke tests passed"

  # ─── Manual approval then deploy to production ─────────────────────────────
  deploy-production:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production  # requires manual approval in GitHub Environments

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig for production
        run: aws eks update-kubeconfig --name avail-production --region ${{ env.AWS_REGION }}

      - name: Run DB migrations (production)
        run: |
          kubectl run prisma-migrate-${{ env.IMAGE_TAG }} \
            --image=${{ env.ECR_REGISTRY }}/avail-auth-service:${{ env.IMAGE_TAG }} \
            --restart=Never \
            --namespace=avail-production \
            --env="DATABASE_URL=${{ secrets.PRODUCTION_DATABASE_URL }}" \
            --command -- npx prisma migrate deploy --schema packages/shared/prisma/schema.prisma
          kubectl wait --for=condition=complete \
            job/prisma-migrate-${{ env.IMAGE_TAG }} \
            --timeout=120s \
            --namespace=avail-production

      - name: Deploy to production
        run: |
          for SERVICE in auth-service groups-service status-service notification-service websocket-service; do
            kubectl set image deployment/avail-${SERVICE} \
              ${SERVICE}=${{ env.ECR_REGISTRY }}/avail-${SERVICE}:${{ env.IMAGE_TAG }} \
              --namespace=avail-production
          done

      - name: Wait for rollout
        run: |
          for SERVICE in auth-service groups-service status-service notification-service websocket-service; do
            kubectl rollout status deployment/avail-${SERVICE} \
              --namespace=avail-production \
              --timeout=300s
          done

      - name: Notify Datadog of deployment
        run: |
          curl -X POST "https://api.datadoghq.com/api/v1/events" \
            -H "DD-API-KEY: ${{ secrets.DATADOG_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "title": "Avail production deploy",
              "text": "Deployed commit ${{ env.IMAGE_TAG }} to production",
              "alert_type": "info",
              "tags": ["env:production", "service:avail"]
            }'
