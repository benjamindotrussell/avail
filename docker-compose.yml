services:
  postgres:
    image: postgres:16-alpine
    container_name: avail-postgres
    environment:
      POSTGRES_DB: avail
      POSTGRES_USER: avail
      POSTGRES_PASSWORD: avail_local
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U avail']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: avail-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE_NAME: auth-service
    container_name: avail-auth
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DATABASE_URL=postgresql://avail:avail_local@postgres:5432/avail
      - REDIS_URL=redis://redis:6379
    env_file:
      - packages/auth-service/.env.local
    ports:
      - '3001:3001'
    volumes:
      - ./packages/auth-service/src:/app/packages/auth-service/src
      - ./packages/shared/src:/app/packages/shared/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  groups-service:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE_NAME: groups-service
    container_name: avail-groups
    environment:
      - NODE_ENV=development
      - PORT=3002
      - DATABASE_URL=postgresql://avail:avail_local@postgres:5432/avail
      - REDIS_URL=redis://redis:6379
    env_file:
      - packages/groups-service/.env.local
    ports:
      - '3002:3002'
    volumes:
      - ./packages/groups-service/src:/app/packages/groups-service/src
      - ./packages/shared/src:/app/packages/shared/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  status-service:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE_NAME: status-service
    container_name: avail-status
    environment:
      - NODE_ENV=development
      - PORT=3003
      - DATABASE_URL=postgresql://avail:avail_local@postgres:5432/avail
      - REDIS_URL=redis://redis:6379
    env_file:
      - packages/status-service/.env.local
    ports:
      - '3003:3003'
    volumes:
      - ./packages/status-service/src:/app/packages/status-service/src
      - ./packages/shared/src:/app/packages/shared/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE_NAME: notification-service
    container_name: avail-notifications
    environment:
      - NODE_ENV=development
      - PORT=3004
      - DATABASE_URL=postgresql://avail:avail_local@postgres:5432/avail
      - REDIS_URL=redis://redis:6379
    env_file:
      - packages/notification-service/.env.local
    ports:
      - '3004:3004'
    volumes:
      - ./packages/notification-service/src:/app/packages/notification-service/src
      - ./packages/shared/src:/app/packages/shared/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  websocket-service:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.service
      args:
        SERVICE_NAME: websocket-service
    container_name: avail-websocket
    environment:
      - NODE_ENV=development
      - PORT=3005
      - DATABASE_URL=postgresql://avail:avail_local@postgres:5432/avail
      - REDIS_URL=redis://redis:6379
    env_file:
      - packages/websocket-service/.env.local
    ports:
      - '3005:3005'
    volumes:
      - ./packages/websocket-service/src:/app/packages/websocket-service/src
      - ./packages/shared/src:/app/packages/shared/src
    depends_on:
      redis:
        condition: service_healthy

  api-gateway:
    image: nginx:1.27-alpine
    container_name: avail-gateway
    ports:
      - '3000:8080'
    volumes:
      - ./infrastructure/docker/nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - auth-service
      - groups-service
      - status-service
      - notification-service
      - websocket-service

volumes:
  postgres_data:
  redis_data:
