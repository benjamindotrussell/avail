---
apiVersion: v1
kind: Namespace
metadata:
  name: avail-production
  labels:
    environment: production

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: avail-secrets
  namespace: avail-production
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: avail-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: avail/production/database
        property: url
    - secretKey: REDIS_URL
      remoteRef:
        key: avail/production/redis
        property: url
    - secretKey: JWT_PRIVATE_KEY
      remoteRef:
        key: avail/production/jwt
        property: private_key
    - secretKey: JWT_PUBLIC_KEY
      remoteRef:
        key: avail/production/jwt
        property: public_key
    - secretKey: FIREBASE_PROJECT_ID
      remoteRef:
        key: avail/production/firebase
        property: project_id
    - secretKey: FIREBASE_CLIENT_EMAIL
      remoteRef:
        key: avail/production/firebase
        property: client_email
    - secretKey: FIREBASE_PRIVATE_KEY
      remoteRef:
        key: avail/production/firebase
        property: private_key
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: avail/production/aws
        property: access_key_id
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: avail/production/aws
        property: secret_access_key
    - secretKey: AWS_SNS_SENDER_ID
      remoteRef:
        key: avail/production/aws
        property: sns_sender_id

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: avail-config
  namespace: avail-production
data:
  NODE_ENV: "production"
  AWS_REGION: "eu-west-1"
  JWT_ACCESS_EXPIRY: "15m"
  JWT_REFRESH_EXPIRY: "30d"
  STATUS_DEFAULT_EXPIRY_HOURS: "8"
  LOG_LEVEL: "info"
