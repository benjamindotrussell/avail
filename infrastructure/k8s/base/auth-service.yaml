apiVersion: apps/v1
kind: Deployment
metadata:
  name: avail-auth-service
  labels:
    app: avail-auth-service
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: avail-auth-service
  template:
    metadata:
      labels:
        app: avail-auth-service
        tier: backend
    spec:
      containers:
        - name: auth-service
          image: PLACEHOLDER_ECR/avail-auth-service:PLACEHOLDER_TAG
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3001"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: avail-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: avail-secrets
                  key: REDIS_URL
            - name: JWT_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: avail-secrets
                  key: JWT_PRIVATE_KEY
            - name: JWT_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: avail-secrets
                  key: JWT_PUBLIC_KEY
            - name: JWT_ACCESS_EXPIRY
              value: "15m"
            - name: JWT_REFRESH_EXPIRY
              value: "30d"
            - name: AWS_REGION
              value: eu-west-1
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: avail-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: avail-secrets
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_SNS_SENDER_ID
              valueFrom:
                secretKeyRef:
                  name: avail-secrets
                  key: AWS_SNS_SENDER_ID
            - name: FIREBASE_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: avail-secrets
                  key: FIREBASE_PROJECT_ID
            - name: FIREBASE_CLIENT_EMAIL
              valueFrom:
                secretKeyRef:
                  name: avail-secrets
                  key: FIREBASE_CLIENT_EMAIL
            - name: FIREBASE_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: avail-secrets
                  key: FIREBASE_PRIVATE_KEY
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /readyz
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
---
apiVersion: v1
kind: Service
metadata:
  name: avail-auth-service
spec:
  selector:
    app: avail-auth-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3001
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: avail-auth-service-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: avail-auth-service
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
