apiVersion: apps/v1
kind: Deployment
metadata:
  name: avail-websocket-service
  labels:
    app: avail-websocket-service
    tier: realtime
spec:
  replicas: 2
  selector:
    matchLabels:
      app: avail-websocket-service
  template:
    metadata:
      labels:
        app: avail-websocket-service
        tier: realtime
    spec:
      containers:
        - name: websocket-service
          image: PLACEHOLDER_ECR/avail-websocket-service:PLACEHOLDER_TAG
          ports:
            - containerPort: 3005
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3005"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: avail-secrets
                  key: REDIS_URL
            - name: JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: avail-secrets
                  key: JWT_ACCESS_SECRET
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /readyz
              port: 3005
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3005
            initialDelaySeconds: 30
            periodSeconds: 30
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: avail-websocket-service
  annotations:
    # ALB sticky sessions — required for Socket.io without Redis adapter
    # (we use Redis adapter, but sticky sessions reduce unnecessary reconnects)
    service.beta.kubernetes.io/aws-load-balancer-target-group-attributes: >-
      stickiness.enabled=true,stickiness.lb_cookie.duration_seconds=86400
spec:
  selector:
    app: avail-websocket-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3005
  # ClientIP affinity as fallback for WebSocket stickiness
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 86400
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: avail-websocket-service-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: avail-websocket-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
