apiVersion: apps/v1
kind: Deployment
metadata:
  name: avail-groups-service
  labels:
    app: avail-groups-service
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: avail-groups-service
  template:
    metadata:
      labels:
        app: avail-groups-service
        tier: backend
    spec:
      containers:
        - name: groups-service
          image: PLACEHOLDER_ECR/avail-groups-service:PLACEHOLDER_TAG
          ports:
            - containerPort: 3002
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: avail-config
                  key: NODE_ENV
            - name: PORT
              value: "3002"
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: avail-config
                  key: LOG_LEVEL
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: avail-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: avail-secrets
                  key: REDIS_URL
            - name: JWT_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: avail-secrets
                  key: JWT_PUBLIC_KEY
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /readyz
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3002
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
---
apiVersion: v1
kind: Service
metadata:
  name: avail-groups-service
spec:
  selector:
    app: avail-groups-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3002
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: avail-groups-service-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: avail-groups-service
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
