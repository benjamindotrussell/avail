---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: avail-staging  # change to avail-production for production
  labels:
    environment: staging

---
# Secrets — populated from AWS Secrets Manager via External Secrets Operator
# DO NOT store real values here — this is a template only
# Real secrets are managed in AWS Secrets Manager and synced via ESO
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: avail-secrets
  namespace: avail-staging
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: avail-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: avail/staging/database
        property: url
    - secretKey: REDIS_URL
      remoteRef:
        key: avail/staging/redis
        property: url
    - secretKey: JWT_PRIVATE_KEY
      remoteRef:
        key: avail/staging/jwt
        property: private_key
    - secretKey: JWT_PUBLIC_KEY
      remoteRef:
        key: avail/staging/jwt
        property: public_key
    - secretKey: FIREBASE_PROJECT_ID
      remoteRef:
        key: avail/staging/firebase
        property: project_id
    - secretKey: FIREBASE_CLIENT_EMAIL
      remoteRef:
        key: avail/staging/firebase
        property: client_email
    - secretKey: FIREBASE_PRIVATE_KEY
      remoteRef:
        key: avail/staging/firebase
        property: private_key
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: avail/staging/aws
        property: access_key_id
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: avail/staging/aws
        property: secret_access_key
    - secretKey: AWS_SNS_SENDER_ID
      remoteRef:
        key: avail/staging/aws
        property: sns_sender_id

---
# ConfigMap — non-sensitive configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: avail-config
  namespace: avail-staging
data:
  NODE_ENV: "staging"
  AWS_REGION: "eu-west-1"
  JWT_ACCESS_EXPIRY: "15m"
  JWT_REFRESH_EXPIRY: "30d"
  STATUS_DEFAULT_EXPIRY_HOURS: "8"
  LOG_LEVEL: "info"
