server {
  listen 8080;

  # Use Docker's embedded DNS — resolves upstream names at request time, not startup
  resolver 127.0.0.11 valid=10s;

  proxy_http_version  1.1;
  proxy_set_header    Host              $host;
  proxy_set_header    X-Real-IP         $remote_addr;
  proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header    X-Forwarded-Proto $scheme;

  # WebSocket service — must match before /v1 blocks
  location /socket.io {
    set $upstream http://websocket-service:3005;
    proxy_pass          $upstream;
    proxy_set_header    Upgrade    $http_upgrade;
    proxy_set_header    Connection "upgrade";
    proxy_read_timeout  86400s;
  }

  location /v1/auth {
    set $upstream http://auth-service:3001;
    proxy_pass $upstream;
  }

  location /v1/users {
    set $upstream http://auth-service:3001;
    proxy_pass $upstream;
  }

  location /v1/groups {
    set $upstream http://groups-service:3002;
    proxy_pass $upstream;
  }

  location /v1/status {
    set $upstream http://status-service:3003;
    proxy_pass $upstream;
  }

  location /v1/notifications {
    set $upstream http://notification-service:3004;
    proxy_pass $upstream;
  }

  location /join {
    set $upstream http://groups-service:3002;
    proxy_pass $upstream;
  }

  location /healthz {
    set $upstream http://auth-service:3001;
    proxy_pass $upstream;
  }
}
